<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />

    <title>TravalPass Ads — Advertise to High-Intent Travelers</title>
    <meta name="description" content="Reach travelers while they plan trips. TravalPass Ads puts your brand inside AI-generated itineraries, travel feeds, and discovery surfaces — at the moment intent is highest." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://travalpass-ads.web.app/" />
    <meta property="og:title" content="TravalPass Ads — Advertise to High-Intent Travelers" />
    <meta property="og:description" content="Reach travelers while they plan trips. Flexible, privacy-first advertising across itinerary feeds, video, and AI-generated travel plans." />
    <meta property="og:image" content="https://travalpass-ads.web.app/assets/ads/reach_travelers.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TravalPass Ads — Advertise to High-Intent Travelers" />
    <meta name="twitter:description" content="Reach travelers while they plan trips. Flexible, privacy-first advertising across itinerary feeds, video, and AI-generated travel plans." />
    <meta name="twitter:image" content="https://travalpass-ads.web.app/assets/ads/reach_travelers.png" />

    <link rel="canonical" href="https://travalpass-ads.web.app/" />

    <!-- Preload the LCP hero image so the browser fetches it before React hydrates -->
    <link rel="preload" as="image" href="/assets/ads/photo1.webp" type="image/webp" fetchpriority="high">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
